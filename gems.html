<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gems — Maria's Games</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💠</text></svg>">
<link rel="stylesheet" href="style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5441764367815214"
     crossorigin="anonymous"></script>
<style>
  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    background: #3a3145;
    border-radius: 12px;
    padding: 8px;
    width: min(92vw, 440px);
    aspect-ratio: 1;
    touch-action: none;
    user-select: none;
  }
  .gem {
    border-radius: 50%;
    cursor: pointer;
    box-shadow: inset -3px -4px 6px rgba(0,0,0,0.25), inset 3px 4px 6px rgba(255,255,255,0.35);
  }
  /* Movement is animated with the translate/scale properties so the
     rotated diamond shape (g2) keeps its transform. */
  .g0 { background: #e2707a; }
  .g1 { background: #f2c94c; border-radius: 22%; }
  .g2 { background: #6fcf7c; border-radius: 22%; transform: rotate(45deg) scale(0.82); }
  .g3 { background: #4cc9f0; }
  .g4 { background: #b388ff; border-radius: 50% 50% 22% 22%; }
  .g5 { background: #f2994a; border-radius: 22% 50% 22% 50%; }
  .gem.selected { outline: 3px solid #fff; outline-offset: 1px; scale: 1.12; }
  .gem.burst { animation: gemburst 0.24s ease forwards; }
  @keyframes gemburst {
    35%  { scale: 1.35; filter: brightness(1.8); }
    100% { scale: 0.1; opacity: 0; filter: brightness(2.4); }
  }
  #message { text-align: center; font-weight: 700; margin-top: 12px; min-height: 1.4em; color: var(--accent-dark); font-size: 1.05rem; }
</style>
</head>
<body>
<header class="site">
  <h1><a href="index.html">🎲 Maria's Games</a></h1>
  <a class="back" href="index.html">← All games</a>
</header>
<main>
  <div class="hud">
    <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
    <button class="btn" id="new">New Game</button>
  </div>
  <div id="board"></div>
  <div id="message"></div>
  <p class="controls-hint">Swap two neighbouring gems to line up 3 or more.<br>
  Tap one gem then a neighbour — or just swipe a gem in any direction. Chains score extra!</p>
</main>
<footer class="site">Made for Maria ❤️</footer>
<script>
(function () {
  const N = 8, TYPES = 6;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const msgEl = document.getElementById('message');
  let board = [];        // N*N gem types 0..5, -1 = empty while resolving
  let score = 0, best, selected = -1, busy = false;

  best = Number(localStorage.getItem('mariagemsmatchbest') || 0);
  bestEl.textContent = best;

  const row = i => Math.floor(i / N), col = i => i % N;
  const adjacent = (a, b) =>
    (row(a) === row(b) && Math.abs(col(a) - col(b)) === 1) ||
    (col(a) === col(b) && Math.abs(row(a) - row(b)) === 1);

  function findMatches(b) {
    const m = new Set();
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N - 2; c++) {
        const i = r * N + c, v = b[i];
        if (v >= 0 && b[i + 1] === v && b[i + 2] === v) {
          let k = c;
          while (k < N && b[r * N + k] === v) { m.add(r * N + k); k++; }
        }
      }
    }
    for (let c = 0; c < N; c++) {
      for (let r = 0; r < N - 2; r++) {
        const i = r * N + c, v = b[i];
        if (v >= 0 && b[i + N] === v && b[i + 2 * N] === v) {
          let k = r;
          while (k < N && b[k * N + c] === v) { m.add(k * N + c); k++; }
        }
      }
    }
    return m;
  }

  function hasMove() {
    for (let i = 0; i < N * N; i++) {
      for (const j of [i + 1, i + N]) {
        if (j >= N * N || (j === i + 1 && col(i) === N - 1)) continue;
        [board[i], board[j]] = [board[j], board[i]];
        const ok = findMatches(board).size > 0;
        [board[i], board[j]] = [board[j], board[i]];
        if (ok) return true;
      }
    }
    return false;
  }

  function newBoard() {
    // Fill avoiding ready-made matches, then make sure a move exists
    do {
      for (let i = 0; i < N * N; i++) {
        let v;
        do {
          v = Math.floor(Math.random() * TYPES);
        } while (
          (col(i) >= 2 && board[i - 1] === v && board[i - 2] === v) ||
          (row(i) >= 2 && board[i - N] === v && board[i - 2 * N] === v)
        );
        board[i] = v;
      }
    } while (!hasMove());
  }

  function render() {
    boardEl.innerHTML = '';
    for (let i = 0; i < N * N; i++) {
      const d = document.createElement('div');
      d.className = 'gem g' + board[i];
      if (i === selected) d.classList.add('selected');
      d.dataset.i = i;
      boardEl.appendChild(d);
    }
  }

  function updateHud() {
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem('mariagemsmatchbest', best);
      bestEl.textContent = best;
    }
  }

  // Returns how far each gem fell (in cells) so the drop can be animated
  function gravityRefill() {
    const moves = [];
    for (let c = 0; c < N; c++) {
      let write = N - 1;
      for (let r = N - 1; r >= 0; r--) {
        if (board[r * N + c] >= 0) {
          if (write !== r) {
            board[write * N + c] = board[r * N + c];
            moves.push({ i: write * N + c, dy: write - r });
          }
          write--;
        }
      }
      // Fresh gems drop in together from above the top edge
      for (let r = write; r >= 0; r--) {
        board[r * N + c] = Math.floor(Math.random() * TYPES);
        moves.push({ i: r * N + c, dy: write + 1 });
      }
    }
    return moves;
  }

  function animateFalls(moves) {
    if (moves.length === 0) return;
    const pitch = boardEl.children[N].offsetTop - boardEl.children[0].offsetTop;
    moves.forEach(({ i, dy }) => {
      const el = boardEl.children[i];
      el.style.transition = 'none';
      el.style.translate = '0 ' + (-dy * pitch) + 'px';
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      moves.forEach(({ i }) => {
        const el = boardEl.children[i];
        el.style.transition = 'translate 0.24s cubic-bezier(0.3, 0.9, 0.4, 1.15)';
        el.style.translate = '0 0';
      });
    }));
  }

  function cascade(mult) {
    const m = findMatches(board);
    if (m.size === 0) {
      busy = false;
      if (mult > 2) msgEl.textContent = '✨ Chain x' + (mult - 1) + '!';
      if (!hasMove()) {
        msgEl.textContent = '🔀 No moves left — shuffling!';
        setTimeout(() => { newBoard(); render(); }, 600);
      }
      return;
    }
    score += m.size * 10 * mult;
    updateHud();
    m.forEach(i => board[i] = -1);
    m.forEach(i => boardEl.children[i].classList.add('burst'));
    setTimeout(() => {
      const moves = gravityRefill();
      render();
      animateFalls(moves);
      setTimeout(() => cascade(mult + 1), 280);
    }, 240);
  }

  // Slide the two gems into each other's places
  function animateSwap(a, b, done) {
    const ea = boardEl.children[a], eb = boardEl.children[b];
    const dx = eb.offsetLeft - ea.offsetLeft, dy = eb.offsetTop - ea.offsetTop;
    ea.style.transition = eb.style.transition = 'translate 0.16s ease';
    ea.style.zIndex = '1';
    ea.style.translate = dx + 'px ' + dy + 'px';
    eb.style.translate = (-dx) + 'px ' + (-dy) + 'px';
    setTimeout(done, 170);
  }

  function trySwap(a, b) {
    if (busy || !adjacent(a, b)) return;
    busy = true;
    selected = -1;
    [board[a], board[b]] = [board[b], board[a]];
    if (findMatches(board).size === 0) {
      // Not a valid move: slide over, then slide back
      [board[a], board[b]] = [board[b], board[a]];
      animateSwap(a, b, () => {
        boardEl.children[a].style.translate = '0 0';
        boardEl.children[b].style.translate = '0 0';
        setTimeout(() => { render(); busy = false; }, 170);
      });
      return;
    }
    msgEl.textContent = '';
    animateSwap(a, b, () => {
      render();
      cascade(1);
    });
  }

  // Tap-tap or swipe
  let downI = -1, downX = 0, downY = 0;
  boardEl.addEventListener('pointerdown', (e) => {
    const t = e.target.closest('.gem');
    if (!t || busy) return;
    downI = Number(t.dataset.i);
    downX = e.clientX;
    downY = e.clientY;
  });
  boardEl.addEventListener('pointerup', (e) => {
    if (downI < 0 || busy) { downI = -1; return; }
    const dx = e.clientX - downX, dy = e.clientY - downY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) > 18) {
      // Swipe: swap with the neighbour in that direction
      let target = -1;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && col(downI) < N - 1) target = downI + 1;
        if (dx < 0 && col(downI) > 0) target = downI - 1;
      } else {
        if (dy > 0 && row(downI) < N - 1) target = downI + N;
        if (dy < 0 && row(downI) > 0) target = downI - N;
      }
      if (target >= 0) trySwap(downI, target);
    } else {
      // Tap: select, then tap a neighbour
      if (selected < 0) {
        selected = downI;
        render();
      } else if (selected === downI) {
        selected = -1;
        render();
      } else if (adjacent(selected, downI)) {
        trySwap(selected, downI);
      } else {
        selected = downI;
        render();
      }
    }
    downI = -1;
  });

  document.getElementById('new').addEventListener('click', () => {
    if (busy) return;
    score = 0;
    selected = -1;
    msgEl.textContent = '';
    updateHud();
    newBoard();
    render();
  });

  newBoard();
  render();
})();
</script>
</body>
</html>
