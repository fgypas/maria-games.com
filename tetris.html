<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris — Maria's Games</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧱</text></svg>">
<link rel="stylesheet" href="style.css">
<style>
  #wrap { display: flex; gap: 16px; align-items: flex-start; justify-content: center; }
  canvas#game {
    background: #2d2733;
    border-radius: 10px;
    box-shadow: var(--shadow);
    width: min(60vw, 280px);
    height: auto;
    touch-action: none;
  }
  #side { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  canvas#next { background: #2d2733; border-radius: 10px; width: 90px; height: 90px; }
  #side .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: #8a7a6a; }
  #message { text-align: center; font-weight: 700; margin-top: 12px; min-height: 1.4em; color: var(--accent-dark); font-size: 1.05rem; }
  #touch {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: min(92vw, 420px);
    margin-top: 14px;
  }
  #touch button {
    font-size: 1.5rem;
    padding: 14px 0;
    border: none;
    border-radius: 12px;
    background: var(--card);
    box-shadow: var(--shadow);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #touch button:active { background: var(--soft); }
</style>
</head>
<body>
<header class="site">
  <h1><a href="index.html">🎲 Maria's Games</a></h1>
  <a class="back" href="index.html">← All games</a>
</header>
<main>
  <div class="hud">
    <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="stat"><div class="label">Lines</div><div class="value" id="lines">0</div></div>
    <div class="stat"><div class="label">Level</div><div class="value" id="level">1</div></div>
    <div class="stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
  </div>
  <div id="wrap">
    <canvas id="game" width="200" height="400"></canvas>
    <div id="side">
      <div class="label">Next</div>
      <canvas id="next" width="80" height="80"></canvas>
      <button class="btn" id="start">Start</button>
      <button class="btn secondary" id="pause">Pause</button>
    </div>
  </div>
  <div id="message"></div>
  <div id="touch">
    <button id="t-left">⬅️</button>
    <button id="t-rotate">🔄</button>
    <button id="t-right">➡️</button>
    <button id="t-drop">⬇️</button>
  </div>
  <p class="controls-hint">Arrows to move, ↑ to rotate, space to drop — or use the buttons.</p>
</main>
<footer class="site">Made for Maria ❤️</footer>
<script>
(function () {
  const COLS = 10, ROWS = 20, SIZE = 20;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');
  const msgEl = document.getElementById('message');
  const scoreEl = document.getElementById('score');
  const linesEl = document.getElementById('lines');
  const levelEl = document.getElementById('level');
  const bestEl = document.getElementById('best');

  const SHAPES = {
    I: { color: '#5ad0e0', cells: [[0,1],[1,1],[2,1],[3,1]], size: 4 },
    O: { color: '#f2c94c', cells: [[0,0],[1,0],[0,1],[1,1]], size: 2 },
    T: { color: '#bb6bd9', cells: [[1,0],[0,1],[1,1],[2,1]], size: 3 },
    S: { color: '#6fcf7c', cells: [[1,0],[2,0],[0,1],[1,1]], size: 3 },
    Z: { color: '#eb5757', cells: [[0,0],[1,0],[1,1],[2,1]], size: 3 },
    J: { color: '#5b7fe0', cells: [[0,0],[0,1],[1,1],[2,1]], size: 3 },
    L: { color: '#f2994a', cells: [[2,0],[0,1],[1,1],[2,1]], size: 3 },
  };
  const NAMES = Object.keys(SHAPES);

  let board, piece, nextName, score, lines, level, best;
  let running = false, paused = false, dropTimer = null;

  best = Number(localStorage.getItem('mariatetrisbest') || 0);
  bestEl.textContent = best;

  function randomName() { return NAMES[Math.floor(Math.random() * NAMES.length)]; }

  function spawn() {
    const name = nextName || randomName();
    nextName = randomName();
    const s = SHAPES[name];
    piece = {
      name, color: s.color, size: s.size,
      cells: s.cells.map(c => c.slice()),
      x: Math.floor((COLS - s.size) / 2), y: 0,
    };
    drawNext();
    if (collides(piece.cells, piece.x, piece.y)) {
      gameOver();
      return false;
    }
    return true;
  }

  function collides(cells, px, py) {
    return cells.some(([cx, cy]) => {
      const x = px + cx, y = py + cy;
      return x < 0 || x >= COLS || y >= ROWS || (y >= 0 && board[y][x]);
    });
  }

  function rotate() {
    if (piece.name === 'O') return;
    const rotated = piece.cells.map(([cx, cy]) => [piece.size - 1 - cy, cx]);
    // Try in place, then wall-kick one cell left/right
    for (const dx of [0, -1, 1, -2, 2]) {
      if (!collides(rotated, piece.x + dx, piece.y)) {
        piece.cells = rotated;
        piece.x += dx;
        return;
      }
    }
  }

  function moveX(dx) {
    if (!collides(piece.cells, piece.x + dx, piece.y)) piece.x += dx;
  }

  function step() {
    if (!collides(piece.cells, piece.x, piece.y + 1)) {
      piece.y++;
      return true;
    }
    lock();
    return false;
  }

  function hardDrop() {
    while (step()) {}
  }

  function lock() {
    piece.cells.forEach(([cx, cy]) => {
      const y = piece.y + cy, x = piece.x + cx;
      if (y >= 0) board[y][x] = piece.color;
    });
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r].every(v => v)) {
        board.splice(r, 1);
        board.unshift(new Array(COLS).fill(null));
        cleared++;
        r++;
      }
    }
    if (cleared) {
      lines += cleared;
      score += [0, 100, 300, 500, 800][cleared] * level;
      const newLevel = Math.floor(lines / 10) + 1;
      if (newLevel !== level) {
        level = newLevel;
        restartTimer();
      }
      updateHud();
    }
    spawn();
  }

  function updateHud() {
    scoreEl.textContent = score;
    linesEl.textContent = lines;
    levelEl.textContent = level;
    if (score > best) {
      best = score;
      localStorage.setItem('mariatetrisbest', best);
      bestEl.textContent = best;
    }
  }

  function drawCell(c, x, y, color, size) {
    c.fillStyle = color;
    c.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c]) drawCell(ctx, c, r, board[r][c], SIZE);
    if (piece) {
      piece.cells.forEach(([cx, cy]) => {
        if (piece.y + cy >= 0) drawCell(ctx, piece.x + cx, piece.y + cy, piece.color, SIZE);
      });
    }
  }

  function drawNext() {
    nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    const s = SHAPES[nextName];
    const cell = 16;
    const offX = (nextCanvas.width - s.size * cell) / 2 / cell;
    const offY = (nextCanvas.height - 2 * cell) / 2 / cell - (s.size === 2 ? 0 : 0.5);
    s.cells.forEach(([cx, cy]) => drawCell(nctx, cx + offX, cy + offY, s.color, cell));
  }

  function tick() {
    if (!running || paused) return;
    step();
    draw();
  }

  function restartTimer() {
    clearInterval(dropTimer);
    const speed = Math.max(90, 700 - (level - 1) * 60);
    dropTimer = setInterval(tick, speed);
  }

  function startGame() {
    board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
    score = 0; lines = 0; level = 1;
    nextName = null;
    running = true; paused = false;
    msgEl.textContent = '';
    document.getElementById('pause').textContent = 'Pause';
    updateHud();
    spawn();
    draw();
    restartTimer();
  }

  function gameOver() {
    running = false;
    clearInterval(dropTimer);
    msgEl.textContent = '💔 Game over — score ' + score + '. Press Start to play again!';
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    document.getElementById('pause').textContent = paused ? 'Resume' : 'Pause';
    msgEl.textContent = paused ? '⏸ Paused' : '';
  }

  function input(action) {
    if (!running || paused) return;
    if (action === 'left') moveX(-1);
    if (action === 'right') moveX(1);
    if (action === 'rotate') rotate();
    if (action === 'down') step();
    if (action === 'drop') hardDrop();
    draw();
  }

  document.addEventListener('keydown', (e) => {
    const map = {
      ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'rotate',
      ArrowDown: 'down', ' ': 'drop',
    };
    if (e.key in map) {
      e.preventDefault();
      input(map[e.key]);
    } else if (e.key === 'p' || e.key === 'P') {
      togglePause();
    }
  });

  const hold = (id, action) => {
    const el = document.getElementById(id);
    el.addEventListener('click', () => input(action));
  };
  hold('t-left', 'left');
  hold('t-right', 'right');
  hold('t-rotate', 'rotate');
  hold('t-drop', 'drop');

  document.getElementById('start').addEventListener('click', startGame);
  document.getElementById('pause').addEventListener('click', togglePause);

  // Draw the empty board before the first game
  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  draw();
  msgEl.textContent = 'Press Start to play!';
})();
</script>
</body>
</html>
