<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper — Maria's Games</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💣</text></svg>">
<link rel="stylesheet" href="style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5441764367815214"
     crossorigin="anonymous"></script>
<style>
  #board {
    display: grid;
    gap: 2px;
    background: #b0a290;
    border-radius: 8px;
    padding: 4px;
    width: min(92vw, 440px);
    user-select: none;
    touch-action: manipulation;
  }
  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: clamp(11px, 3.4vw, 20px);
    background: #d9cdb8;
    border-radius: 3px;
    cursor: pointer;
    box-shadow: inset 2px 2px 3px rgba(255,255,255,0.6), inset -2px -2px 3px rgba(0,0,0,0.15);
  }
  .cell.open {
    background: #f3ede1;
    box-shadow: none;
    cursor: default;
  }
  .cell.boom { background: #e2707a; }
  .n1 { color: #2b6fd6; } .n2 { color: #2e8b3a; } .n3 { color: #d63b3b; } .n4 { color: #23348f; }
  .n5 { color: #8a4a20; } .n6 { color: #1d8a8a; } .n7 { color: #333; } .n8 { color: #777; }
  #flag-toggle.active { background: var(--accent); color: #fff; }
  #message { text-align: center; font-weight: 700; margin-top: 12px; min-height: 1.4em; color: var(--accent-dark); font-size: 1.05rem; }
</style>
</head>
<body>
<header class="site">
  <h1><a href="index.html">🎲 Maria's Games</a></h1>
  <a class="back" href="index.html">← All games</a>
</header>
<main>
  <div class="hud">
    <button class="btn" id="new-easy">Easy</button>
    <button class="btn" id="new-medium">Medium</button>
    <button class="btn" id="new-hard">Hard</button>
  </div>
  <div class="hud">
    <div class="stat"><div class="label">Mines</div><div class="value" id="mines-left">10</div></div>
    <div class="stat"><div class="label">Time</div><div class="value" id="time">0</div></div>
    <button class="btn secondary" id="flag-toggle">🚩 Flag mode</button>
  </div>
  <div id="board"></div>
  <div id="message"></div>
  <p class="controls-hint">Tap to reveal, right-click to flag a mine.<br>
  On the phone, switch on 🚩 Flag mode to place flags by tapping. First tap is always safe.</p>
</main>
<footer class="site">Made for Maria ❤️</footer>
<script>
(function () {
  const boardEl = document.getElementById('board');
  const minesEl = document.getElementById('mines-left');
  const timeEl = document.getElementById('time');
  const msgEl = document.getElementById('message');
  const flagBtn = document.getElementById('flag-toggle');

  let W, H, MINES;
  let mine, open, flag, count;
  let firstClick, over, flagMode = false, timer = null, seconds = 0;

  function idx(r, c) { return r * W + c; }
  function neighbors(i) {
    const r = Math.floor(i / W), c = i % W, out = [];
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const rr = r + dr, cc = c + dc;
        if (rr >= 0 && rr < H && cc >= 0 && cc < W) out.push(idx(rr, cc));
      }
    return out;
  }

  function newGame(w, h, m) {
    W = w; H = h; MINES = m;
    mine = new Array(W * H).fill(false);
    open = new Array(W * H).fill(false);
    flag = new Array(W * H).fill(false);
    count = new Array(W * H).fill(0);
    firstClick = true;
    over = false;
    seconds = 0;
    clearInterval(timer);
    timeEl.textContent = '0';
    msgEl.textContent = '';
    boardEl.style.gridTemplateColumns = `repeat(${W}, 1fr)`;
    render();
    updateMines();
  }

  function placeMines(safe) {
    // First click and its neighbours are always safe
    const forbidden = new Set([safe, ...neighbors(safe)]);
    let placed = 0;
    while (placed < MINES) {
      const i = Math.floor(Math.random() * W * H);
      if (mine[i] || forbidden.has(i)) continue;
      mine[i] = true;
      placed++;
    }
    for (let i = 0; i < W * H; i++)
      count[i] = neighbors(i).filter(n => mine[n]).length;
  }

  function reveal(i) {
    if (over || open[i] || flag[i]) return;
    if (firstClick) {
      firstClick = false;
      placeMines(i);
      timer = setInterval(() => { seconds++; timeEl.textContent = seconds; }, 1000);
    }
    if (mine[i]) { lose(i); return; }
    const stack = [i];
    while (stack.length) {
      const j = stack.pop();
      if (open[j] || flag[j]) continue;
      open[j] = true;
      if (count[j] === 0) neighbors(j).forEach(n => { if (!open[n]) stack.push(n); });
    }
    render();
    checkWin();
  }

  function toggleFlag(i) {
    if (over || open[i] || firstClick) return;
    flag[i] = !flag[i];
    render();
    updateMines();
  }

  function updateMines() {
    minesEl.textContent = MINES - flag.filter(Boolean).length;
  }

  function lose(hit) {
    over = true;
    clearInterval(timer);
    for (let i = 0; i < W * H; i++) if (mine[i]) open[i] = true;
    render(hit);
    msgEl.textContent = '💥 Boom! Try again — pick a difficulty above.';
  }

  function checkWin() {
    for (let i = 0; i < W * H; i++) if (!mine[i] && !open[i]) return;
    over = true;
    clearInterval(timer);
    for (let i = 0; i < W * H; i++) if (mine[i]) flag[i] = true;
    render();
    updateMines();
    msgEl.textContent = '🎉 Bravo Maria! Cleared in ' + seconds + 's!';
  }

  function render(hit) {
    boardEl.innerHTML = '';
    for (let i = 0; i < W * H; i++) {
      const d = document.createElement('div');
      d.className = 'cell';
      if (open[i]) {
        d.classList.add('open');
        if (mine[i]) {
          d.textContent = '💣';
          if (i === hit) d.classList.add('boom');
        } else if (count[i] > 0) {
          d.textContent = count[i];
          d.classList.add('n' + count[i]);
        }
      } else if (flag[i]) {
        d.textContent = '🚩';
      }
      d.dataset.i = i;
      boardEl.appendChild(d);
    }
  }

  boardEl.addEventListener('click', (e) => {
    const t = e.target.closest('.cell');
    if (!t) return;
    const i = Number(t.dataset.i);
    if (flagMode) toggleFlag(i);
    else reveal(i);
  });
  boardEl.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const t = e.target.closest('.cell');
    if (t) toggleFlag(Number(t.dataset.i));
  });

  flagBtn.addEventListener('click', () => {
    flagMode = !flagMode;
    flagBtn.classList.toggle('active', flagMode);
  });

  document.getElementById('new-easy').addEventListener('click', () => newGame(9, 9, 10));
  document.getElementById('new-medium').addEventListener('click', () => newGame(12, 12, 24));
  document.getElementById('new-hard').addEventListener('click', () => newGame(16, 16, 44));

  newGame(9, 9, 10);
})();
</script>
</body>
</html>
